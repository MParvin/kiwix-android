name: Build and Release APK

# Trigger only on tag pushes
on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    # Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Set up JDK 17 (recommended for modern Android projects)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Set up Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Cache Gradle dependencies
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Make gradlew executable
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # Build the release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    # Get the tag name for release
    - name: Get tag name
      id: tag_name
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    # Find the built APK file
    - name: Find APK file
      id: find_apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
        if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
          echo "❌ No APK found in app/build/outputs/apk/release"
          ls -la app/build/outputs/apk/release/ || echo "Release directory not found"
          exit 1
        fi
        APK_NAME=$(basename "$APK_PATH")
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT
        echo "✅ Found APK: $APK_PATH ($(numfmt --to=iec $APK_SIZE))"

    # Determine if this is a pre-release
    - name: Determine release type
      id: release_type
      run: |
        TAG_NAME="${{ steps.tag_name.outputs.TAG_NAME }}"
        if [[ "$TAG_NAME" =~ (alpha|beta|rc|pre|dev|snapshot) ]]; then
          echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          echo "📋 Detected pre-release tag: $TAG_NAME"
        else
          echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          echo "🚀 Detected stable release tag: $TAG_NAME"
        fi

    # Verify APK before release
    - name: Verify APK
      run: |
        APK_PATH="${{ steps.find_apk.outputs.APK_PATH }}"
        echo "🔍 Verifying APK: $APK_PATH"
        
        # APK is a zip archive; verify zip integrity first.
        if ! unzip -tqq "$APK_PATH" >/dev/null 2>&1; then
          echo "❌ Invalid APK file (zip integrity check failed)"
          exit 1
        fi

        # Ensure core APK entry exists.
        if ! unzip -l "$APK_PATH" | awk '{print $4}' | grep -qx "AndroidManifest.xml"; then
          echo "❌ Invalid APK file (missing AndroidManifest.xml)"
          exit 1
        fi
        
        # Check APK size (should be reasonable, not empty)
        APK_SIZE=$(stat -c%s "$APK_PATH")
        if [ "$APK_SIZE" -lt 1048576 ]; then  # Less than 1MB
          echo "⚠️ Warning: APK seems too small ($APK_SIZE bytes)"
        fi
        
        echo "✅ APK verification passed"

    # Create GitHub Release and Upload APK
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
        name: Kiwix Android ${{ steps.tag_name.outputs.TAG_NAME }}
        body: |
          ## Kiwix Android Release ${{ steps.tag_name.outputs.TAG_NAME }}
          
          ### 📥 Installation
          Download the APK file below and install it on your Android device.
          
          **⚠️ Important Notes:**
          - This APK is unsigned - enable "Unknown Sources" in your device settings
          - For production use, consider using signed APKs from official distribution channels
          - Minimum Android version requirements may apply
          
          ### 📊 Build Information
          - **Built from:** `${{ github.sha }}`
          - **Build date:** ${{ steps.tag_name.outputs.TAG_NAME }}
          - **APK file:** `${{ steps.find_apk.outputs.APK_NAME }}`
          
          ### 🔄 Changes
          - Automated build from tag ${{ steps.tag_name.outputs.TAG_NAME }}
          
          For detailed changes, see the [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.tag_name.outputs.TAG_NAME }}).
        files: |
          ${{ steps.find_apk.outputs.APK_PATH }}
        prerelease: ${{ steps.release_type.outputs.PRERELEASE }}
        draft: false
        fail_on_unmatched_files: true

    # Upload build artifacts for debugging (optional)
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ steps.tag_name.outputs.TAG_NAME }}
        path: |
          app/build/outputs/
          build/
        retention-days: 7